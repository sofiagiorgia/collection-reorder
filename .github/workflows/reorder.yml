name: Reorder N21 Collections

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Istruzioni di riordino in linguaggio naturale (lascia vuoto per usare la configurazione di default)'
        required: false
        type: string

jobs:
  reorder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      STORE: numero-ventuno.myshopify.com
      STORE_CONFIG: stores/n21/default-config.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Interpreta prompt
        if: ${{ inputs.prompt != '' }}
        env:
          PROMPT: ${{ inputs.prompt }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        run: |
          if ! node interpret-prompt.mjs > reorder-config.json; then
            echo "::error::Prompt non valido. Controlla le collection e i gruppi specificati."
            exit 1
          fi

      - name: Riordina collection
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        run: node reorder-collection.mjs
