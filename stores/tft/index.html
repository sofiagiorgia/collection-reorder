<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFT — Riordino Collection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 4px;
      padding: 48px 40px;
      width: 420px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 12px;
      color: #999;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      height: 120px;
      border: 1px solid #ddd;
      border-radius: 2px;
      padding: 12px;
      font-size: 13px;
      font-family: inherit;
      color: #111;
      resize: vertical;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #111; }
    textarea::placeholder { color: #bbb; }
    .hint {
      font-size: 11px;
      color: #bbb;
      margin-top: 8px;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #333; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .status {
      margin-top: 18px;
      font-size: 12px;
      min-height: 18px;
      text-align: center;
    }
    .status.success { color: #2e7d32; }
    .status.error { color: #c62828; }
  </style>
</head>
<body>
  <div class="card">
    <h1>TFT — Riordino Collection</h1>
    <p class="subtitle">Inserisci le istruzioni per avviare il riordino.</p>

    <label for="prompt">Istruzioni</label>
    <textarea
      id="prompt"
      placeholder="Es: riordina la collection Divani, metti prima i prodotti con stock ordinati per colore, gli esauriti in fondo."
    ></textarea>
    <p class="hint">Il prompt è obbligatorio.<br>Specifica collection, metafield e logica di ordinamento.</p>

    <button id="btn" onclick="trigger()">Avvia riordino</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const WORKER_URL = 'https://tft-reorder-trigger.partner-100.workers.dev';
    const PASSWORD = 'tftreorder2026';

    async function trigger() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      const prompt = document.getElementById('prompt').value.trim();

      if (!prompt) {
        status.textContent = 'Inserisci le istruzioni prima di avviare il riordino.';
        status.className = 'status error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Avvio in corso...';
      status.textContent = '';
      status.className = 'status';

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: PASSWORD, prompt }),
        });

        const data = await res.json();

        if (data.ok) {
          status.textContent = '✓ Riordino avviato.';
          status.className = 'status success';
        } else {
          status.textContent = 'Errore: ' + (data.error || res.status);
          status.className = 'status error';
        }
      } catch (e) {
        status.textContent = 'Errore di rete. Riprova.';
        status.className = 'status error';
      }

      btn.textContent = 'Avvia riordino';
      btn.disabled = false;
    }
  </script>
</body>
</html>
